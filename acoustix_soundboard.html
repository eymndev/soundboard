<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acoustix - Kolay Soundboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
        }
        /* Dokunsal aktiflik efekti */
        .sound-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- ÜST MENÜ BAR -->
    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-lg text-white shadow-md shadow-blue-500/20">
                    <i class="fa-solid fa-volume-high text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tight text-white">Acoustix Soundboard</h1>
                    <p class="text-[10px] text-gray-400">Gerçek ses dosyalarıyla çalışan hızlı oynatıcı</p>
                </div>
            </div>
            
            <button id="btn-stop-all" class="px-3 py-1.5 bg-red-600/20 hover:bg-red-600/40 border border-red-500/30 text-red-400 text-xs font-bold rounded-lg transition duration-150 flex items-center gap-1.5">
                <i class="fa-solid fa-square"></i> Tümünü Sustur
            </button>
        </div>
    </header>

    <!-- ANA İÇERİK ALANI -->
    <main class="flex-grow max-w-4xl w-full mx-auto p-4 sm:p-6 flex flex-col justify-center gap-6">
        
        <!-- Dinamik olarak doldurulacak Kategori ve Ses Butonları -->
        <div id="soundboard-container" class="space-y-8">
            <!-- Kategoriler JS ile buraya eklenecektir -->
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="border-t border-gray-800 bg-gray-950/80 py-4 px-6 text-center">
        <p class="text-[10px] text-gray-500">
            Acoustix Kolay Ses Masası • JSON Veri Yönetimli
        </p>
    </footer>

    <script>
        // Kolayca düzenlenebilir, doğrudan MP3 dosya yollarını hedefleyen JSON verisi
        const soundboardData = {
            "categories": [
                {
                    "id": "bell",
                    "name": "Zil Sesleri (Bells)",
                    "icon": "🔔",
                    "color": "from-amber-600 to-yellow-500",
                    "glow": "shadow-amber-500/10",
                    "sounds": [
                        {
                            "id": "b_opening",
                            "name": "Masaüstü Açılış Zili",
                            "file": "sound/bell/b_opening.mp3"
                        }
                    ]
                },
                {
                    "id": "lightsaber",
                    "name": "Işın Kılıcı (Lightsaber)",
                    "icon": "⚔️",
                    "color": "from-blue-600 to-indigo-500",
                    "glow": "shadow-blue-500/10",
                    "sounds": [
                        {
                            "id": "ls_opening",
                            "name": "Kılıç Ateşleme Efekti",
                            "file": "sound/lightsaber/ls_opening.mp3"
                        }
                    ]
                }
            ]
        };

        // Aktif çalınan seslerin referanslarını tutar (aynı anda veya üst üste çalabilmesi için)
        const activeAudios = {};

        // Sayfa yüklendiğinde soundboard'u çiz
        window.addEventListener("load", () => {
            renderSoundboard();
        });

        // JSON verilerini HTML butonlarına dönüştüren fonksiyon
        function renderSoundboard() {
            const container = document.getElementById("soundboard-container");
            container.innerHTML = "";

            soundboardData.categories.forEach(category => {
                // Kategori Kartı
                const catSection = document.createElement("section");
                catSection.className = "bg-gray-900/40 border border-gray-800/80 rounded-2xl p-5 space-y-4 shadow-sm";
                
                // Kategori Başlığı
                catSection.innerHTML = `
                    <div class="flex items-center gap-2 pb-2 border-b border-gray-800/60">
                        <span class="text-xl">${category.icon}</span>
                        <h2 class="text-sm font-bold text-gray-200 tracking-wide uppercase">${category.name}</h2>
                    </div>
                `;

                // Ses Butonları Gridi
                const grid = document.createElement("div");
                grid.className = "grid grid-cols-1 sm:grid-cols-2 gap-3";

                category.sounds.forEach(sound => {
                    const btn = document.createElement("button");
                    btn.id = `btn-${sound.id}`;
                    btn.className = `sound-btn w-full p-4 rounded-xl bg-gray-800/50 hover:bg-gray-800 border border-gray-800 hover:border-gray-700 flex items-center justify-between text-left transition duration-150 group shadow-lg ${category.glow}`;
                    
                    btn.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-gradient-to-br ${category.color} flex items-center justify-center text-white shadow-sm transition duration-150 group-hover:scale-110">
                                <i class="fa-solid fa-play text-xs pl-0.5" id="icon-${sound.id}"></i>
                            </div>
                            <div>
                                <div class="font-bold text-xs text-gray-100">${sound.name}</div>
                                <div class="text-[9px] text-gray-500 font-mono mt-0.5">${sound.file}</div>
                            </div>
                        </div>
                        <span class="text-[10px] text-gray-500 group-hover:text-gray-300 transition-colors"><i class="fa-solid fa-chevron-right"></i></span>
                    `;

                    // Tıklama Olayı (Ses Çalma)
                    btn.onclick = () => playSound(sound);

                    grid.appendChild(btn);
                });

                catSection.appendChild(grid);
                container.appendChild(catSection);
            });
        }

        // Belirtilen mp3 dosyasını yükler, çalar ve buton durumunu günceller
        function playSound(sound) {
            // Eğer aynı ses zaten çalıyorsa, başa sarıp tekrar çalsın (kesintisiz/çift tetikleme desteği için)
            if (activeAudios[sound.id]) {
                activeAudios[sound.id].pause();
                activeAudios[sound.id].currentTime = 0;
            }

            // Yeni ses dosyası objesi oluştur
            const audio = new Audio(sound.file);
            activeAudios[sound.id] = audio;

            // Buton durumunu 'Oynatılıyor' görseline dönüştür
            setButtonState(sound.id, true);

            audio.play().catch(err => {
                console.warn("Ses oynatılamadı. Lütfen ses klasörlerini ve dosya yollarını kontrol edin.", err);
                setButtonState(sound.id, false);
            });

            // Ses bittiğinde butonu eski haline getir
            audio.onended = () => {
                setButtonState(sound.id, false);
                delete activeAudios[sound.id];
            };
        }

        // Çalışmakta olan tüm ses dosyalarını durdurur
        document.getElementById("btn-stop-all").onclick = () => {
            Object.keys(activeAudios).forEach(id => {
                if (activeAudios[id]) {
                    activeAudios[id].pause();
                    activeAudios[id].currentTime = 0;
                    setButtonState(id, false);
                }
            });
            // Listeyi temizle
            for (let member in activeAudios) delete activeAudios[member];
        };

        function setButtonState(soundId, isPlaying) {
            const icon = document.getElementById(`icon-${soundId}`);
            const btn = document.getElementById(`btn-${soundId}`);
            if (!icon || !btn) return;

            if (isPlaying) {
                icon.className = "fa-solid fa-spinner animate-spin text-xs";
                btn.classList.add("border-blue-500/50", "bg-blue-950/20");
            } else {
                icon.className = "fa-solid fa-play text-xs pl-0.5";
                btn.classList.remove("border-blue-500/50", "bg-blue-950/20");
            }
        }
    </script>
</body>
</html>
